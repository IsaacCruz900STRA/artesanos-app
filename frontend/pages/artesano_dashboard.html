<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Artesano — ArtesanosMX</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --terracota: #C0622A; --terracota-dark: #9E4E20;
      --arena: #F5ECD7;     --arena-dark: #EDD9B0;
      --verde: #3A6B4A;     --verde-light: #4E8F63;
      --text: #2C2C2C;      --text-light: #6B6B6B; --white: #FFFFFF;
    }
    body { font-family: 'Inter', sans-serif; background: var(--arena); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── NAV ── */
    nav { background: var(--white); padding: 1rem 2.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.07); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--terracota); text-decoration: none; }
    .nav-logo span { color: var(--verde); }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--text); font-weight: 500; font-size: 0.95rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--terracota); }
    .nav-btn-carrito { background: var(--terracota); color: var(--white); border: none; padding: 0.5rem 1.1rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .nav-btn-carrito:hover { background: var(--terracota-dark); }
    .nav-divider { width: 1px; height: 20px; background: #E8E0D5; }
    .nav-btn-cerrar { background: none; border: 1px solid #E8E0D5; color: var(--text-light); padding: 0.45rem 1rem; border-radius: 6px; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .nav-btn-cerrar:hover { border-color: var(--terracota); color: var(--terracota); }
    .nav-usuario-chip { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; background: #e8f0eb; border: 1px solid var(--verde); padding: 0.4rem 0.9rem; border-radius: 20px; }
    .nav-usuario-chip .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--verde); color: var(--white); font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .nav-usuario-chip .nombre { font-size: 0.88rem; font-weight: 600; color: var(--text); }

    /* ── LAYOUT ── */
    .page-container { max-width: 1100px; margin: 2.5rem auto; padding: 0 2rem; display: grid; grid-template-columns: 240px 1fr; gap: 1.8rem; flex: 1; width: 100%; }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 0.4rem; }
    .perfil-mini { background: var(--terracota); border-radius: 16px; padding: 1.4rem; color: var(--white); margin-bottom: 0.6rem; }
    .perfil-mini-top { display: flex; align-items: center; gap: 0.9rem; margin-bottom: 0.8rem; }
    .avatar-grande { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; flex-shrink: 0; }
    .perfil-mini-info strong { font-size: 0.95rem; font-weight: 700; display: block; }
    .perfil-mini-info span { font-size: 0.78rem; opacity: 0.75; }
    .panel-badge { display: inline-block; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35); padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

    /* Stats mini en sidebar */
    .sidebar-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.8rem; }
    .sidebar-stat { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 0.5rem 0.7rem; text-align: center; }
    .sidebar-stat .num { font-size: 1.2rem; font-weight: 700; display: block; }
    .sidebar-stat .lbl { font-size: 0.7rem; opacity: 0.8; }

    .nav-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--text); transition: all 0.2s; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--arena-dark); }
    .nav-item.active { background: var(--white); color: var(--terracota); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .nav-item .icon { font-size: 1.1rem; width: 22px; text-align: center; }
    .sidebar-divider { border: none; border-top: 1px solid #e0d8ce; margin: 0.4rem 0; }
    .btn-volver { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: var(--text-light); background: none; border: none; width: 100%; text-align: left; transition: all 0.2s; text-decoration: none; }
    .btn-volver:hover { background: var(--arena-dark); color: var(--text); }
    .btn-cerrar-sesion { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; border-radius: 10px; cursor: pointer; font-size: 0.88rem; font-weight: 500; color: var(--terracota); background: none; border: none; width: 100%; text-align: left; transition: all 0.2s; }
    .btn-cerrar-sesion:hover { background: #fdf0ea; }

    /* ── CONTENIDO ── */
    .content-area { display: flex; flex-direction: column; }
    .tab-panel { display: none; flex-direction: column; gap: 1.2rem; }
    .tab-panel.active { display: flex; }

    .card { background: var(--white); border: 1px solid #ede5da; border-radius: 16px; padding: 1.6rem; }
    .card-titulo { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .card-sub { font-size: 0.83rem; color: var(--text-light); margin-bottom: 1.2rem; }

    /* Stats overview */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .stat-card { background: var(--white); border: 1px solid #ede5da; border-radius: 14px; padding: 1.2rem; text-align: center; }
    .stat-card .num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--terracota); display: block; }
    .stat-card .lbl { font-size: 0.8rem; color: var(--text-light); margin-top: 0.2rem; }

    /* Form */
    .form-grid { display: grid; gap: 1rem; }
    .col-2 { grid-template-columns: 1fr 1fr; }
    .col-3 { grid-template-columns: 1fr 1fr 1fr; }
    .col-full { grid-column: 1/-1; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.65rem 0.9rem; border: 1.5px solid #e0d8ce; border-radius: 8px;
      font-size: 0.92rem; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s; background: var(--white); color: var(--text);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--terracota); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .input-hint { font-size: 0.75rem; color: var(--text-light); margin-top: 0.2rem; }
    .form-actions { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 0.8rem; }
    .btn-guardar { background: var(--terracota); color: var(--white); border: none; padding: 0.65rem 1.6rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-guardar:hover { background: var(--terracota-dark); }
    .btn-secundario { background: none; border: 1.5px solid #ddd; color: var(--text-light); padding: 0.65rem 1.2rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-secundario:hover { border-color: var(--text); color: var(--text); }
    .btn-verde { background: var(--verde); color: var(--white); border: none; padding: 0.65rem 1.4rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-verde:hover { background: var(--verde-light); }

    /* Toast inline */
    .toast-inline { padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; display: none; margin-bottom: 0.8rem; }
    .toast-inline.ok    { background: #eaf4ee; color: var(--verde); border: 1px solid #c5dace; }
    .toast-inline.error { background: #fdf0ea; color: var(--terracota); border: 1px solid #f0c4a8; }

    /* ── TABLA PRODUCTOS ── */
    .tabla-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .tabla-header h3 { font-size: 0.95rem; font-weight: 700; }
    .productos-tabla { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .productos-tabla th { text-align: left; padding: 0.6rem 0.8rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-light); border-bottom: 2px solid #ede5da; }
    .productos-tabla td { padding: 0.85rem 0.8rem; border-bottom: 1px solid #f5ede0; vertical-align: middle; }
    .productos-tabla tr:last-child td { border-bottom: none; }
    .productos-tabla tr:hover td { background: #fdfaf6; }
    .prod-nombre-cell { display: flex; align-items: center; gap: 0.7rem; }
    .prod-emoji-cell { width: 38px; height: 38px; background: var(--arena-dark); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .prod-nombre-cell strong { font-weight: 600; display: block; font-size: 0.9rem; }
    .prod-nombre-cell span { font-size: 0.78rem; color: var(--text-light); }
    .precio-cell { font-weight: 700; color: var(--terracota); }
    .cat-tag { background: var(--arena); border: 1px solid var(--arena-dark); padding: 0.15rem 0.6rem; border-radius: 20px; font-size: 0.75rem; color: var(--text-light); }
    .acciones-cell { display: flex; gap: 0.5rem; }
    .btn-edit { background: none; border: 1.5px solid #e0d8ce; color: var(--text-light); padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-edit:hover { border-color: var(--verde); color: var(--verde); }
    .btn-del { background: none; border: 1.5px solid #f0c4a8; color: var(--terracota); padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-del:hover { background: var(--terracota); color: var(--white); border-color: var(--terracota); }
    .tabla-vacia { text-align: center; padding: 3rem; color: var(--text-light); }
    .tabla-vacia .emoji { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; }

    /* Modal agregar/editar producto */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 20px; padding: 2rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.4rem; }
    .modal-header h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
    .btn-modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-light); transition: color 0.2s; }
    .btn-modal-close:hover { color: var(--text); }

    /* ── PEDIDOS RECIBIDOS ── */
    .pedidos-lista { display: flex; flex-direction: column; gap: 1rem; }
    .pedido-card { background: var(--white); border: 1px solid #ede5da; border-radius: 14px; overflow: hidden; }
    .pedido-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.3rem; border-bottom: 1px solid #f5ede0; }
    .pedido-num { font-weight: 700; font-size: 0.9rem; color: var(--terracota); }
    .pedido-fecha { font-size: 0.78rem; color: var(--text-light); margin-top: 0.1rem; }
    .pedido-badge { padding: 0.25rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .badge-nuevo      { background: #fdf0ea; color: var(--terracota); }
    .badge-preparando { background: #fff8e8; color: #b07c10; }
    .badge-enviado    { background: #eaf4ee; color: var(--verde); }
    .pedido-body { padding: 1rem 1.3rem; display: flex; align-items: center; gap: 1rem; }
    .pedido-info { flex: 1; }
    .pedido-info strong { font-size: 0.88rem; font-weight: 600; display: block; }
    .pedido-info p { font-size: 0.78rem; color: var(--text-light); margin-top: 0.15rem; }
    .pedido-total { font-weight: 700; font-size: 1rem; color: var(--terracota); }
    .pedido-footer { padding: 0.7rem 1.3rem; background: #fdfaf6; border-top: 1px solid #f5ede0; display: flex; justify-content: space-between; align-items: center; }
    .pedido-footer span { font-size: 0.78rem; color: var(--text-light); }
    .select-estado { border: 1.5px solid #e0d8ce; border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.8rem; font-family: 'Inter', sans-serif; outline: none; cursor: pointer; background: var(--white); transition: border-color 0.2s; }
    .select-estado:focus { border-color: var(--terracota); }

    /* Eliminación animada */
    .removing { animation: slideOut 0.3s ease forwards; }
    @keyframes slideOut { to { opacity: 0; transform: translateX(20px); max-height: 0; padding: 0; margin: 0; overflow: hidden; } }

    /* Toast flotante */
    .toast-float { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--verde); color: var(--white); padding: 0.8rem 1.4rem; border-radius: 10px; font-size: 0.88rem; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 9999; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; }
    .toast-float.show { opacity: 1; transform: translateY(0); }

    /* Sin acceso */
    .no-acceso { text-align: center; padding: 5rem 2rem; grid-column: 1/-1; }
    .no-acceso .emoji { font-size: 3rem; display: block; margin-bottom: 1rem; }
    .no-acceso h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 0.8rem; }
    .no-acceso p { color: var(--text-light); margin-bottom: 1.5rem; }
    .btn-back { background: var(--verde); color: var(--white); border: none; padding: 0.7rem 2rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }

    footer { background: var(--text); color: #aaa; padding: 1.5rem; text-align: center; font-size: 0.85rem; margin-top: auto; }

    @media (max-width: 860px) {
      .page-container { grid-template-columns: 1fr; padding: 0 1.2rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .perfil-mini { display: none; }
      .sidebar { flex-direction: row; flex-wrap: wrap; }
      .nav-item { flex: 1; justify-content: center; min-width: 80px; font-size: 0.78rem; }
      .productos-tabla th:nth-child(3), .productos-tabla td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-logo">Artesanos<span>MX</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="artesanos.html">Artesanos</a></li>
      <li class="nav-divider"></li>
      <li id="nav-sesion"></li>
      <li id="nav-usuario-chip"></li>
    </ul>
  </nav>

  <div class="page-container" id="page-container"></div>

  <!-- Modal producto -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-titulo">Agregar producto</h3>
        <button class="btn-modal-close" onclick="cerrarModal()">×</button>
      </div>
      <div id="toast-modal" class="toast-inline"></div>
      <div class="form-grid">
        <input type="hidden" id="m-id" />
        <input type="hidden" id="m-imagen-url" />
        <div class="form-group col-full">
          <label>Nombre del producto <span style="color:var(--terracota)">*</span></label>
          <input type="text" id="m-nombre" placeholder="Ej. Tapete de lana natural" />
        </div>
        <div class="form-group col-full">
          <label>Descripción <span style="color:var(--terracota)">*</span></label>
          <textarea id="m-descripcion" placeholder="Describe materiales, técnica, origen..."></textarea>
        </div>
        <div class="form-group">
          <label>Precio (MXN) <span style="color:var(--terracota)">*</span></label>
          <input type="number" id="m-precio" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Categoría <span style="color:var(--terracota)">*</span></label>
          <select id="m-categoria">
            <option value="">— Seleccionar —</option>
            <option>Textiles</option><option>Cerámica</option><option>Joyería</option>
            <option>Mezcal</option><option>Alimentos</option><option>Madera</option>
            <option>Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Stock disponible</label>
          <input type="number" id="m-stock" placeholder="0" min="0" />
        </div>
        <div class="form-group col-full">
          <label>Imagen del producto</label>
          <!-- Preview -->
          <div id="imagen-preview" style="width:100%;height:160px;border:2px dashed #e0d8ce;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:0.6rem;overflow:hidden;background:var(--arena);cursor:pointer;" onclick="document.getElementById('m-imagen-file').click()">
            <div id="preview-placeholder" style="text-align:center;color:var(--text-light);">
              <div style="font-size:2rem;">📷</div>
              <div style="font-size:0.82rem;margin-top:0.4rem;">Haz clic para seleccionar imagen</div>
              <div style="font-size:0.75rem;opacity:0.7;">JPG, PNG, WEBP · Máx. 5MB</div>
            </div>
            <img id="preview-img" src="" style="display:none;width:100%;height:100%;object-fit:cover;" />
          </div>
          <input type="file" id="m-imagen-file" accept="image/*" style="display:none;" onchange="previsualizarImagen(this)" />
          <div style="display:flex;gap:0.5rem;align-items:center;">
            <button type="button" class="btn-verde" style="font-size:0.82rem;padding:0.4rem 0.9rem;" onclick="document.getElementById('m-imagen-file').click()">
              Seleccionar imagen
            </button>
            <button type="button" class="btn-secundario" style="font-size:0.82rem;padding:0.4rem 0.9rem;" onclick="limpiarImagen()" id="btn-limpiar-img">
              Quitar imagen
            </button>
            <span id="upload-status" style="font-size:0.78rem;color:var(--text-light);"></span>
          </div>
        </div>
      </div>
      <div class="form-actions" style="margin-top:1.2rem;">
        <button class="btn-secundario" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-guardar" id="btn-guardar-producto" onclick="guardarProducto()">Guardar producto</button>
      </div>
    </div>
  </div>

  <footer>© 2026 ArtesanosMX — Hecho con ❤️ en México</footer>
  <div class="toast-float" id="toast"></div>

  <script>
    const usuario   = JSON.parse(localStorage.getItem('usuario'));
    const navSesion = document.getElementById('nav-sesion');
    const navChip   = document.getElementById('nav-usuario-chip');
    const container = document.getElementById('page-container');

    const emojis = { 'Textiles':'🧵','Cerámica':'🏺','Joyería':'💎','Mezcal':'🥃','Alimentos':'🌶️','Madera':'🪆','Otro':'🎨' };
    const emojiDefault = '🎨';

    // ── Acceso solo artesanos ──
    if (!usuario || usuario.rol !== 'artesano') {
      if (!usuario) navSesion.innerHTML = `<a href="auth.html" style="background:var(--verde);color:#fff;border:none;padding:0.5rem 1.1rem;border-radius:6px;font-size:0.9rem;font-weight:600;text-decoration:none;">Iniciar sesión</a>`;
      container.innerHTML = `
        <div class="no-acceso">
          <span class="emoji">🔒</span>
          <h2>Acceso exclusivo para artesanos</h2>
          <p>Esta sección es solo para usuarios registrados como artesanos.</p>
          <a href="cuenta.html" class="btn-back">Volver a mi cuenta</a>
        </div>`;
    } else {

      // ── Nav ──
      const inicial      = usuario.nombre.charAt(0).toUpperCase();
      const primerNombre = usuario.nombre.split(' ')[0];
      navChip.innerHTML  = `
        <a href="cuenta.html" class="nav-usuario-chip" title="Mi cuenta">
          <div class="avatar">${inicial}</div>
          <span class="nombre">${primerNombre}</span>
        </a>`;
      navSesion.innerHTML = `<button class="nav-btn-cerrar" onclick="cerrarSesion()">Cerrar sesión</button>`;

      // ── Estado local ──
      let productos = JSON.parse(localStorage.getItem('artesano_productos')) || [];
      let pedidos   = JSON.parse(localStorage.getItem('artesano_pedidos'))   || generarPedidosDemo();

      function generarPedidosDemo() {
        return [
          { id:'PED-001', cliente:'María García', fecha:'10 mayo 2026', items:[{nombre:'Tapete de lana',cantidad:1,precio:1500}], estado:'nuevo' },
          { id:'PED-002', cliente:'Carlos Ruiz',  fecha:'8 mayo 2026',  items:[{nombre:'Jarra de barro',cantidad:2,precio:680}],   estado:'preparando' },
          { id:'PED-003', cliente:'Ana López',    fecha:'5 mayo 2026',  items:[{nombre:'Pulsera Huichol',cantidad:3,precio:95}],   estado:'enviado' },
        ];
      }

      // Stats
      const totalProductos = productos.length;
      const totalPedidos   = pedidos.length;
      const pedidosNuevos  = pedidos.filter(p => p.estado === 'nuevo').length;
      const ingresoTotal   = pedidos.reduce((a,p) => a + p.items.reduce((b,i) => b + i.precio * i.cantidad, 0), 0);

      container.innerHTML = `
        <div class="sidebar">
          <div class="perfil-mini">
            <div class="perfil-mini-top">
              <div class="avatar-grande">${inicial}</div>
              <div class="perfil-mini-info">
                <strong>${usuario.nombre}</strong>
                <span>${usuario.email}</span>
              </div>
            </div>
            <span class="panel-badge">🏺 Panel Artesano</span>
            <div class="sidebar-stats">
              <div class="sidebar-stat"><span class="num">${totalProductos}</span><span class="lbl">Productos</span></div>
              <div class="sidebar-stat"><span class="num">${pedidosNuevos}</span><span class="lbl">Nuevos pedidos</span></div>
            </div>
          </div>

          <button class="nav-item active" onclick="cambiarTab('resumen',this)"><span class="icon">📊</span> Resumen</button>
          <button class="nav-item" onclick="cambiarTab('productos',this)"><span class="icon">🏺</span> Mis productos</button>
          <button class="nav-item" onclick="cambiarTab('pedidos',this)"><span class="icon">📦</span> Pedidos recibidos</button>
          <button class="nav-item" onclick="cambiarTab('perfil',this)"><span class="icon">✏️</span> Mi perfil artesano</button>

          <hr class="sidebar-divider">
          <a href="cuenta.html" class="btn-volver"><span>←</span> Mi cuenta</a>
          <button class="btn-cerrar-sesion" onclick="cerrarSesion()"><span>🚪</span> Cerrar sesión</button>
        </div>

        <div class="content-area">

          <!-- RESUMEN -->
          <div class="tab-panel active" id="tab-resumen">
            <div class="stats-grid">
              <div class="stat-card"><span class="num">${totalProductos}</span><span class="lbl">Productos activos</span></div>
              <div class="stat-card"><span class="num">${totalPedidos}</span><span class="lbl">Pedidos totales</span></div>
              <div class="stat-card"><span class="num">${pedidosNuevos}</span><span class="lbl">Pedidos nuevos</span></div>
              <div class="stat-card"><span class="num">$${ingresoTotal.toLocaleString('es-MX')}</span><span class="lbl">Ingresos totales</span></div>
            </div>

            <div class="card">
              <div class="card-titulo">Bienvenido, ${primerNombre} 👋</div>
              <div class="card-sub">Desde aquí puedes gestionar tus productos y pedidos en ArtesanosMX.</div>
              <div style="display:flex;gap:0.8rem;flex-wrap:wrap;">
                <button class="btn-guardar" onclick="abrirModal()">+ Agregar producto</button>
                <button class="btn-verde" onclick="cambiarTab('pedidos', document.querySelectorAll('.nav-item')[2])">Ver pedidos nuevos</button>
              </div>
            </div>

            <div class="card">
              <div class="tabla-header">
                <h3>Últimos productos</h3>
                <button class="btn-secundario" onclick="cambiarTab('productos', document.querySelectorAll('.nav-item')[1])">Ver todos</button>
              </div>
              <div id="tabla-resumen-productos"></div>
            </div>
          </div>

          <!-- PRODUCTOS -->
          <div class="tab-panel" id="tab-productos">
            <div class="card">
              <div class="tabla-header">
                <div>
                  <div class="card-titulo">Mis productos</div>
                  <div class="card-sub" style="margin-bottom:0;">Gestiona tu catálogo de artesanías.</div>
                </div>
                <button class="btn-guardar" onclick="abrirModal()">+ Agregar producto</button>
              </div>
              <div id="toast-productos" class="toast-inline"></div>
              <div id="tabla-productos-container"></div>
            </div>
          </div>

          <!-- PEDIDOS -->
          <div class="tab-panel" id="tab-pedidos">
            <div class="card">
              <div class="card-titulo">Pedidos recibidos</div>
              <div class="card-sub">Actualiza el estado de cada pedido.</div>
            </div>
            <div class="pedidos-lista" id="pedidos-lista"></div>
          </div>

          <!-- PERFIL ARTESANO -->
          <div class="tab-panel" id="tab-perfil">
            <div class="card">
              <div class="card-titulo">Perfil público de artesano</div>
              <div class="card-sub">Esta información aparece en la sección de Artesanos del sitio.</div>
              <div id="toast-perfil" class="toast-inline"></div>
              <div class="form-grid col-2">
                <div class="form-group col-full">
                  <label>Nombre o taller artesanal</label>
                  <input type="text" id="pa-nombre" value="${usuario.nombre}" />
                </div>
                <div class="form-group col-full">
                  <label>Descripción / historia</label>
                  <textarea id="pa-descripcion" placeholder="Cuéntanos sobre tu trabajo, técnicas, tradición familiar...">${usuario.descripcion_artesano || ''}</textarea>
                </div>
                <div class="form-group">
                  <label>Estado / región</label>
                  <select id="pa-estado">
                    ${['Oaxaca','Chiapas','Guerrero','Puebla','Veracruz','Jalisco','Ciudad de México','Michoacán','Hidalgo','Yucatán'].map(e =>
                      `<option ${(usuario.estado_artesano||'Oaxaca')===e?'selected':''}>${e}</option>`
                    ).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Teléfono / WhatsApp</label>
                  <input type="tel" id="pa-tel" value="${usuario.telefono || ''}" placeholder="(000) 000-0000" />
                </div>
                <div class="form-group col-full">
                  <label>Especialidades (separadas por coma)</label>
                  <input type="text" id="pa-especialidades" value="${usuario.especialidades || ''}" placeholder="Ej. Textiles, Bordado en telar, Tintura natural" />
                </div>
              </div>
              <div class="form-actions">
                <button class="btn-guardar" onclick="guardarPerfilArtesano()">Guardar perfil</button>
              </div>
            </div>
          </div>

        </div>`;

      renderTablaProductos();
      renderTablaResumen();
      renderPedidos();

    } // fin else

    // ── TABS ──
    function cambiarTab(tab, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (btn) btn.classList.add('active');
    }

    // ── TOAST ──
    function showToast(msg, ok = true) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = ok ? 'var(--verde)' : 'var(--terracota)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function toastInline(id, msg, ok) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = 'toast-inline ' + (ok ? 'ok' : 'error');
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3500);
    }

    function cerrarSesion() {
      localStorage.removeItem('token');
      localStorage.removeItem('usuario');
      window.location.href = '../index.html';
    }

    // ── RENDER TABLA PRODUCTOS ──
    function renderTablaProductos() {
      const productos = JSON.parse(localStorage.getItem('artesano_productos')) || [];
      const c = document.getElementById('tabla-productos-container');
      if (!c) return;
      if (productos.length === 0) {
        c.innerHTML = `<div class="tabla-vacia"><span class="emoji">🏺</span>Aún no tienes productos.<br><small>Usa el botón "+ Agregar producto" para empezar.</small></div>`;
        return;
      }
      c.innerHTML = `
        <table class="productos-tabla">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Precio</th>
              <th>Categoría</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            ${productos.map(p => `
              <tr>
                <td>
                  <div class="prod-nombre-cell">
                    <div class="prod-emoji-cell">${emojis[p.categoria] || emojiDefault}</div>
                    <div>
                      <strong>${p.nombre}</strong>
                      <span>${p.descripcion.substring(0,40)}${p.descripcion.length>40?'…':''}</span>
                    </div>
                  </div>
                </td>
                <td class="precio-cell">$${Number(p.precio).toLocaleString('es-MX')}</td>
                <td><span class="cat-tag">${p.categoria || '—'}</span></td>
                <td>${p.stock ?? '—'}</td>
                <td>
                  <div class="acciones-cell">
                    <button class="btn-edit" onclick="editarProducto('${p.id}')">Editar</button>
                    <button class="btn-del"  onclick="eliminarProducto('${p.id}')">Eliminar</button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function renderTablaResumen() {
      const productos = JSON.parse(localStorage.getItem('artesano_productos')) || [];
      const c = document.getElementById('tabla-resumen-productos');
      if (!c) return;
      const ultimos = productos.slice(-3).reverse();
      if (ultimos.length === 0) {
        c.innerHTML = `<p style="color:var(--text-light);font-size:0.85rem;">Aún no has agregado productos.</p>`;
        return;
      }
      c.innerHTML = `
        <table class="productos-tabla">
          <thead><tr><th>Producto</th><th>Precio</th><th>Categoría</th></tr></thead>
          <tbody>
            ${ultimos.map(p => `
              <tr>
                <td><div class="prod-nombre-cell">
                  <div class="prod-emoji-cell">${emojis[p.categoria] || emojiDefault}</div>
                  <strong>${p.nombre}</strong>
                </div></td>
                <td class="precio-cell">$${Number(p.precio).toLocaleString('es-MX')}</td>
                <td><span class="cat-tag">${p.categoria || '—'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    // ── RENDER PEDIDOS ──
    function renderPedidos() {
      const pedidos = JSON.parse(localStorage.getItem('artesano_pedidos')) || generarPedidosDemo();
      const c = document.getElementById('pedidos-lista');
      if (!c) return;
      if (pedidos.length === 0) {
        c.innerHTML = `<div class="tabla-vacia card"><span class="emoji">📭</span>No tienes pedidos aún.</div>`;
        return;
      }
      const badgeMap = { nuevo:'badge-nuevo', preparando:'badge-preparando', enviado:'badge-enviado' };
      const labelMap = { nuevo:'Nuevo', preparando:'Preparando', enviado:'Enviado' };
      c.innerHTML = pedidos.map(p => {
        const total = p.items.reduce((a,i) => a + i.precio * i.cantidad, 0);
        return `
          <div class="pedido-card" id="pedido-${p.id}">
            <div class="pedido-header">
              <div>
                <div class="pedido-num">#${p.id}</div>
                <div class="pedido-fecha">${p.fecha}</div>
              </div>
              <span class="pedido-badge ${badgeMap[p.estado]||'badge-nuevo'}">${labelMap[p.estado]||'Nuevo'}</span>
            </div>
            <div class="pedido-body">
              <div class="pedido-info">
                <strong>Cliente: ${p.cliente}</strong>
                <p>${p.items.map(i => `${i.nombre} ×${i.cantidad}`).join(', ')}</p>
              </div>
              <span class="pedido-total">$${total.toLocaleString('es-MX')} MXN</span>
            </div>
            <div class="pedido-footer">
              <span>${p.items.length} producto${p.items.length>1?'s':''}</span>
              <select class="select-estado" onchange="actualizarEstadoPedido('${p.id}', this.value)">
                <option value="nuevo"      ${p.estado==='nuevo'?'selected':''}>Nuevo</option>
                <option value="preparando" ${p.estado==='preparando'?'selected':''}>Preparando</option>
                <option value="enviado"    ${p.estado==='enviado'?'selected':''}>Enviado</option>
              </select>
            </div>
          </div>`;
      }).join('');
    }

    function actualizarEstadoPedido(id, nuevoEstado) {
      const pedidos = JSON.parse(localStorage.getItem('artesano_pedidos')) || [];
      const p = pedidos.find(x => x.id === id);
      if (p) {
        p.estado = nuevoEstado;
        localStorage.setItem('artesano_pedidos', JSON.stringify(pedidos));
        renderPedidos();
        showToast('Estado actualizado');
      }
    }

    const API   = 'http://localhost:3000/api';
    const token = localStorage.getItem('token');

    // ── MODAL PRODUCTO ──
    let editandoId = null;

    function abrirModal(id = null) {
      editandoId = id;
      document.getElementById('modal-titulo').textContent = id ? 'Editar producto' : 'Agregar producto';
      document.getElementById('toast-modal').style.display = 'none';
      limpiarImagen();

      if (id) {
        const productos = JSON.parse(localStorage.getItem('artesano_productos')) || [];
        const p = productos.find(x => x.id === id);
        if (p) {
          document.getElementById('m-id').value          = p.id;
          document.getElementById('m-nombre').value      = p.nombre;
          document.getElementById('m-descripcion').value = p.descripcion;
          document.getElementById('m-precio').value      = p.precio;
          document.getElementById('m-categoria').value   = p.categoria;
          document.getElementById('m-stock').value       = p.stock || '';
          document.getElementById('m-imagen-url').value  = p.imagen_url || '';
          // Mostrar imagen actual si existe
          if (p.imagen_url) {
            document.getElementById('preview-img').src = 'http://localhost:3000' + p.imagen_url;
            document.getElementById('preview-img').style.display = 'block';
            document.getElementById('preview-placeholder').style.display = 'none';
            document.getElementById('upload-status').textContent = 'Imagen actual';
          }
        }
      } else {
        ['m-id','m-nombre','m-descripcion','m-precio'].forEach(i => document.getElementById(i).value = '');
        document.getElementById('m-categoria').value  = '';
        document.getElementById('m-stock').value      = '';
        document.getElementById('m-imagen-url').value = '';
      }
      document.getElementById('modal-overlay').classList.add('open');
    }

    function cerrarModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      editandoId = null;
    }

    function previsualizarImagen(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('preview-img').src = e.target.result;
        document.getElementById('preview-img').style.display = 'block';
        document.getElementById('preview-placeholder').style.display = 'none';
        document.getElementById('upload-status').textContent = file.name;
      };
      reader.readAsDataURL(file);
    }

    function limpiarImagen() {
      document.getElementById('m-imagen-file').value  = '';
      document.getElementById('m-imagen-url').value   = '';
      document.getElementById('preview-img').src      = '';
      document.getElementById('preview-img').style.display      = 'none';
      document.getElementById('preview-placeholder').style.display = 'flex';
      document.getElementById('upload-status').textContent = '';
    }

    async function subirImagen(file) {
      const formData = new FormData();
      formData.append('imagen', file);
      const res = await fetch(`${API}/upload/productos`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al subir imagen');
      return data.url;
    }

    async function guardarProducto() {
      const id          = document.getElementById('m-id').value;
      const nombre      = document.getElementById('m-nombre').value.trim();
      const descripcion = document.getElementById('m-descripcion').value.trim();
      const precio      = parseFloat(document.getElementById('m-precio').value);
      const categoria   = document.getElementById('m-categoria').value;
      const stock       = document.getElementById('m-stock').value;
      const fileInput   = document.getElementById('m-imagen-file');
      const btnGuardar  = document.getElementById('btn-guardar-producto');

      if (!nombre || !descripcion || !precio || !categoria) {
        toastInline('toast-modal', 'Completa los campos obligatorios.', false);
        return;
      }

      btnGuardar.disabled = true;
      btnGuardar.textContent = 'Guardando...';

      try {
        // Subir imagen si se seleccionó una nueva
        let imagen_url = document.getElementById('m-imagen-url').value || null;
        if (fileInput.files && fileInput.files[0]) {
          document.getElementById('upload-status').textContent = 'Subiendo imagen...';
          imagen_url = await subirImagen(fileInput.files[0]);
          document.getElementById('upload-status').textContent = '✓ Imagen subida';
        }

        const body = { nombre, descripcion, precio, categoria, stock: stock || null, imagen_url };
        const url  = id ? `${API}/productos/${id}` : `${API}/productos`;
        const method = id ? 'PUT' : 'POST';

        const res  = await fetch(url, {
          method,
          headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) { toastInline('toast-modal', data.error || 'Error al guardar.', false); return; }

        // Sync localStorage
        let productos = JSON.parse(localStorage.getItem('artesano_productos')) || [];
        const prodId  = data.id_producto || id;
        if (id) {
          productos = productos.map(p => p.id == id ? { ...p, ...body, id: prodId } : p);
        } else {
          productos.push({ id: prodId, ...body, fecha: new Date().toLocaleDateString('es-MX') });
        }
        localStorage.setItem('artesano_productos', JSON.stringify(productos));

        cerrarModal();
        renderTablaProductos();
        renderTablaResumen();
        showToast(id ? '✓ Producto actualizado' : '✓ Producto agregado');
      } catch(e) {
        toastInline('toast-modal', e.message || 'Error de conexión.', false);
      } finally {
        btnGuardar.disabled = false;
        btnGuardar.textContent = 'Guardar producto';
      }
    }

    function editarProducto(id) { abrirModal(id); }

    function eliminarProducto(id) {
      if (!confirm('¿Eliminar este producto?')) return;
      let productos = JSON.parse(localStorage.getItem('artesano_productos')) || [];
      productos = productos.filter(p => p.id !== id);
      localStorage.setItem('artesano_productos', JSON.stringify(productos));
      renderTablaProductos();
      renderTablaResumen();
      showToast('Producto eliminado', false);
    }

    // ── PERFIL ARTESANO ──
    function guardarPerfilArtesano() {
      const actualizado = {
        ...usuario,
        nombre:               document.getElementById('pa-nombre').value.trim(),
        descripcion_artesano: document.getElementById('pa-descripcion').value.trim(),
        estado_artesano:      document.getElementById('pa-estado').value,
        telefono:             document.getElementById('pa-tel').value.trim(),
        especialidades:       document.getElementById('pa-especialidades').value.trim(),
      };
      localStorage.setItem('usuario', JSON.stringify(actualizado));
      toastInline('toast-perfil', '✓ Perfil guardado correctamente.', true);
      showToast('✓ Perfil artesano actualizado');
    }

    // Cerrar modal al hacer click fuera
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) cerrarModal();
    });

    function generarPedidosDemo() {
      return [
        { id:'PED-001', cliente:'María García', fecha:'10 mayo 2026', items:[{nombre:'Tapete de lana',cantidad:1,precio:1500}], estado:'nuevo' },
        { id:'PED-002', cliente:'Carlos Ruiz',  fecha:'8 mayo 2026',  items:[{nombre:'Jarra de barro',cantidad:2,precio:680}],  estado:'preparando' },
        { id:'PED-003', cliente:'Ana López',    fecha:'5 mayo 2026',  items:[{nombre:'Pulsera Huichol',cantidad:3,precio:95}],  estado:'enviado' },
      ];
    }
  </script>

</body>
</html>
