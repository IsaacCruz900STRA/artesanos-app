<!doctype html>
<html lang="en">    
  <head>
    <meta charset="UTF-8" />
    <title>Artesanos App</title>
    <link rel="stylesheet" href="/styles.css">
  </head>

  <body>
    <nav> 
        <h2>OaxacaMarket</h2> 

      <ul>
        <li><a href="/">Catalogo</a></li>
        <li><a href="/productos">Productores</a></li>
        <li><a href="/contacto">Iniciar Sesión</a></li>
      </ul>
    </nav>

    <main>  
             <h1>Productos de Oaxaca al Mundo</h1>

               
        <p>
            Plataforma de compra-venta de artesanías oaxaqueñas y mexicanas.
        </p>

        <nav>
      <h3>Categorías</h3>
      <ul>
        <li><a href="#">Textiles</a></li>
        <li><a href="#">Mezcal</a></li>
        <li><a href="#">Cerámica</a></li>
        <li><a href="#">Joyería</a></li>
      </ul>
    </nav>

 <section id="productos"></section>
  </main>
  
        
     <script>
    fetch("/productos")
      .then(res => res.json())
      .then(data => {
        const contenedor = document.getElementById("productos");

        contenedor.innerHTML = "";

        data.forEach(p => {
          contenedor.innerHTML += `
            <article class="product-card">

              <figure class="product-img">
                Producto
              </figure>

              <section class="product-body">
                <h3>${p.nombre}</h3>
                <p>${p.descripcion}</p>
              </section>

              <footer class="product-footer">
                $${p.precio}
              </footer>

            </article>
          `;
        });
      })
      .catch(err => console.log("ERROR:", err));
    </script>
  </body>
</html>
